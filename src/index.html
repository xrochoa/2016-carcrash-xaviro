<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>CarCrash 2 &mdash; FridgeBinge (2016 / 2026)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="CarCrash 2 — a synthwave re-skin of the retro 8-bit browser game originally built with Phaser for the FridgeBinge mini-game platform (2016). Portfolio refresh 2026." />
    <meta name="author" content="Xavier Reyes Ochoa" />
    <style type="text/css">
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
        height: 100%;
        width: 100%;
    }

    html {
        background:
            linear-gradient(to bottom, rgba(50, 50, 51, .92), rgba(76, 251, 206, .88)),
            radial-gradient(circle at 50% 35%, #2a2a2b 0%, #141414 100%);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }

    body {
        font-family: "Courier New", Courier, monospace;
        color: #f5f9fa;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 16px;
    }

    #phaser-game {
        image-rendering: pixelated;
        image-rendering: -moz-crisp-edges;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }

    .hint {
        margin-top: 18px;
        padding: 10px 14px;
        max-width: 320px;
        font-size: 13px;
        letter-spacing: 0.5px;
        color: #f5f9fa;
        opacity: 0.85;
    }

    .footer {
        margin-top: 10px;
        font-size: 11px;
        letter-spacing: 1px;
        text-transform: uppercase;
        opacity: 0.55;
    }

    .footer a, .hint a {
        color: inherit;
        text-decoration: none;
        border-bottom: 1px dotted currentColor;
    }

    .hint a:hover { opacity: 1; }

    .sim-badge {
        position: fixed;
        top: 14px;
        left: 14px;
        padding: 4px 10px;
        font-family: "Courier New", Courier, monospace;
        font-size: 11px;
        letter-spacing: 2px;
        color: #4cfbce;
        border: 1px solid #4cfbce;
        border-radius: 2px;
        text-transform: uppercase;
        background: rgba(20, 20, 20, 0.5);
        display: none;
    }

    .sim-badge::before {
        content: "\25CF";
        margin-right: 6px;
        animation: sim-blink 1s steps(2, start) infinite;
    }

    @keyframes sim-blink {
        to { visibility: hidden; }
    }

    html.simulation .sim-badge { display: inline-block; }
    </style>
</head>

<body>
    <div class="sim-badge">SIM &mdash; auto demo</div>
    <div id="phaser-game"></div>
    <p class="hint">
        Press <strong>Enter</strong> or click to start.<br/>
        Use <strong>arrow keys</strong> or click to move.<br/>
        <a href="?sim=1" id="sim-link">&#9654; Watch auto-demo</a>
    </p>
    <p class="footer">CarCrash 2 &middot; FridgeBinge &middot; 2016 &middot; synthwave edit 2026</p>

    <script>
    //surface simulation mode on the page (CSS hook + hide the demo link)
    if (/[?&]sim=1\b/.test(window.location.search)) {
        document.documentElement.classList.add('simulation');
        var link = document.getElementById('sim-link');
        if (link) { link.textContent = '\u25A0 Stop demo'; link.href = '.'; }
    }
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/systemjs/0.19.40/system.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/2.6.2/phaser.min.js"></script>
    <script>
    SystemJS.import('./games/carcrash/main.js').then(function(gameModule) {
        gameModule();
    });
    </script>
</body>

</html>
